<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buenos Aires Sonido</title>
<link rel="stylesheet" href="style.css">

<meta property="og:title" content="Buenos Aires Sonido - Arma tu Presupuesto">
<meta property="og:description" content="Generá tu presupuesto en segundos.">
<meta property="og:image" content="https://buenosairessonido.github.io/ArmaTuPresupuesto/img/preview.jpg">
<meta property="og:url" content="https://buenosairessonido.github.io/ArmaTuPresupuesto/">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://buenosairessonido.github.io/ArmaTuPresupuesto/img/preview.jpg">

</head>
<body>
<header class="hero"></header>

<main>
<section class="cliente">
<h2 class="titulo-principal">ARMA TU PRESUPUESTO</h2>
<h2>Info del evento y Contacto</h2>
<input placeholder="Nombre">
<input placeholder="Teléfono">
<input placeholder="Lugar del evento">
<label class="etiqueta">Fecha del evento</label>
<input type="date">
<textarea placeholder="Observaciones"></textarea>
</section>

<section class="combos">

<h2>Combos Inteligentes</h2>

<div class="combo-grid">

<button class="combo-btn" onclick="cargarCombo('50-solista')">
Combo 50 Personas (Solista)
</button>

<button class="combo-btn" onclick="cargarCombo('50-duo')">
Combo 50 Personas (Duos)
</button>

<button class="combo-btn" onclick="cargarCombo('50-trio')">
Combo 50 Personas (Trios)
</button>

<button class="combo-btn" onclick="cargarCombo('100-solista')">
Combo 100 Personas (Solista)
</button>

<button class="combo-btn" onclick="cargarCombo('100-duo')">
Combo 100 Personas (Duos)
</button>

<button class="combo-btn" onclick="cargarCombo('100-trio')">
Combo 100 Personas (Trios)
</button>

</div>

</section>


<section class="productos" style="display:none;">

<h2>Eleji el Equipamiento</h2>

<div id="lista"></div>

</section>

<section class="resumen">
<h2>Resumen</h2>
<table>
<thead><tr><th>Producto</th><th>Cant.</th><th>Subtotal</th></tr></thead>

<tr>

<td>Grabación Multitrack 8 Canales limpios + Main mix</td>

<td style="text-align:center;">

<label class="switch">

<input
type="checkbox"
id="chkMultitrack"
onchange="toggleMultitrack()">

<span class="slider"></span>

</label>

</td>

<td>$50.000</td>

</tr>

<tbody id="carrito"></tbody>
</table>
<h3>Total: $<span id="total">0</span></h3>
<br>

<div class="botones">

<button class="btn-limpiar" onclick="limpiarTodo()">
    Limpiar
</button>

    <button class="btn-whatsapp" onclick="generarWhatsApp()">
        Enviar WhatsApp
    </button>

</div>

</section>
</main>

<script src="app.js"></script>
</body>
</html>
